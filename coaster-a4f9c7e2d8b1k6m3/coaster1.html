<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>For My Sweet Girl</title>
	<meta name="theme-color" content="#ea4c89">
	<link rel="icon" href="../favicon.ico" type="image/x-icon">
	<style>
		:root {
			--bg1: #fff1f7;
			--bg2: #ffe3ee;
			--card: rgba(255, 255, 255, 0.84);
			--text: #5f1d3b;
			--accent: #d6336c;
			--shadow: 0 24px 60px rgba(214, 51, 108, 0.25);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100dvh;
			display: grid;
			place-items: center;
			padding: 18px;
			font-family: Inter, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			color: var(--text);
			background:
				radial-gradient(900px 500px at -10% -20%, rgba(255, 255, 255, 0.9), transparent 55%),
				radial-gradient(700px 420px at 110% 0%, rgba(255, 255, 255, 0.65), transparent 55%),
				linear-gradient(145deg, var(--bg1), var(--bg2));
		}

		.card {
			width: min(100%, 420px);
			background: var(--card);
			border: 1px solid rgba(255, 255, 255, 0.9);
			border-radius: 28px;
			box-shadow: var(--shadow);
			backdrop-filter: blur(10px);
			overflow: hidden;
		}

		.image-wrap {
			position: relative;
			padding: 16px 16px 0;
		}

		.main-image {
			width: 100%;
			display: block;
			border-radius: 22px;
			border: 2px solid rgba(255, 255, 255, 0.95);
			box-shadow: 0 12px 26px rgba(0, 0, 0, 0.16);
			object-fit: cover;
			max-height: 52vh;
		}

		.heart {
			position: absolute;
			right: 26px;
			bottom: 10px;
			width: 44px;
			height: 44px;
			border-radius: 50%;
			display: grid;
			place-items: center;
			background: rgba(255, 255, 255, 0.9);
			box-shadow: 0 8px 24px rgba(214, 51, 108, 0.25);
			color: var(--accent);
			font-size: 1.35rem;
		}

		.content {
			padding: 20px 22px 24px;
			text-align: center;
		}

		h1 {
			margin: 0 0 10px;
			line-height: 1.2;
			font-size: clamp(1.38rem, 5vw, 1.8rem);
			color: var(--accent);
			letter-spacing: 0.01em;
		}

		.line {
			width: 64px;
			height: 3px;
			margin: 0 auto 14px;
			border-radius: 999px;
			background: linear-gradient(90deg, #ff7da9, #d6336c);
			opacity: 0.85;
		}

		p {
			margin: 0;
			font-size: 1rem;
			line-height: 1.7;
			color: #6c2a4b;
			text-wrap: pretty;
		}

		.footer {
			margin-top: 14px;
			font-size: 0.78rem;
			text-transform: uppercase;
			letter-spacing: 0.12em;
			color: #b44572;
			opacity: 0.8;
		}
	</style>
</head>
<body>
	<main class="card" role="main" aria-label="Love card">
		<div class="image-wrap">
			<img src="../images/coasters/coaster1.jpg" alt="A special memory together" class="main-image">
			<div class="heart" aria-hidden="true">❤</div>
		</div>
		<section class="content">
			<h1>I can’t even kiss you without smiling</h1>
			<div class="line" aria-hidden="true"></div>
			<p>
				Every time I kiss you, I can’t help but smile. I remember staring at you,
				only thinking about how unobtainable that first kiss would be. I imagined how
				perfect it would be — and every single time, it’s still just as perfect as I imagined.
			</p>
		</section>
	</main>
</body>
</html>
